name: Refresh dashboard data

on:
  schedule:
    # 21:00 UTC = 05:00 MYT — daily refresh before the workday.
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run data pipeline (ingest -> SQLite -> JSON)
        env:
          BPS_API_KEY: ${{ secrets.BPS_API_KEY }}
          GFW_API_KEY: ${{ secrets.GFW_API_KEY }}
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: python run_pipeline.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add borneo_tracker_poc.csv borneo_tracker_history.csv public/data/indicators.json public/data/resilience.json
          if git diff --cached --quiet; then
            echo "No data changes today."
          else
            git commit -m "chore: scheduled data refresh"
            git push
          fi
