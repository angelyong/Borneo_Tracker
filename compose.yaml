name: borneo-tracker

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: borneo_tracker_app
      POSTGRES_USER: borneo_app
      POSTGRES_PASSWORD: local_borneo_password
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U borneo_app -d borneo_tracker_app"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    restart: unless-stopped

volumes:
  postgres_data:
